name: Daily Name WOD notification

on:
  schedule:
    - cron: '*/5 * * * *'
      timezone: 'America/New_York'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: daily-name-wod-notification
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Send due Name WOD reminders
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/send-daily-notification.mjs
